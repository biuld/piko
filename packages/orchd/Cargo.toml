[package]
name = "orchd"
version = "0.1.0"
edition = "2024"
description = "piko orchestrator daemon — Rust-native AI agent runtime"
license = "MIT OR Apache-2.0"

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-actors = "0.6"
self-llm = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1"
thiserror = "2"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
futures-core = "0.3"
pin-project-lite = "0.2"
tokio-util = "0.7"
tokio-stream = "0.1"
piko-sandbox = { path = "../sandbox" }
