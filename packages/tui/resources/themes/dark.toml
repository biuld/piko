# piko built-in theme: dark
# Optimized for dark terminal backgrounds.

[theme]
name = "dark"

[vars]
cyan = "#00d7ff"
blue = "#5f87ff"
green = "#b5bd68"
red = "#cc6666"
yellow = "#ffff00"
text_color = "#d4d4d4"
gray = "#808080"
dim_gray = "#666666"
dark_gray = "#505050"
accent_color = "#8abeb7"
selected_bg = "#3a3a4a"
user_msg_bg = "#343541"
tool_pending_bg = "#282832"
tool_success_bg = "#283228"
tool_error_bg = "#3c2828"
custom_msg_bg = "#2d2838"

[colors]
accent = "accent_color"
accentAlt = "blue"
border = "blue"
borderAccent = "cyan"
borderMuted = "dark_gray"
success = "green"
error = "red"
warning = "yellow"
info = "blue"
muted = "gray"
dim = "dim_gray"
text = "text_color"

# Layer 2 — extended (parsed, reserved for planned features)
thinkingText = "gray"
selectedBg = "selected_bg"
userMessageBg = "user_msg_bg"
userMessageText = "text_color"
customMessageBg = "custom_msg_bg"
customMessageText = "text_color"
customMessageLabel = "#9575cd"
toolPendingBg = "tool_pending_bg"
toolSuccessBg = "tool_success_bg"
toolErrorBg = "tool_error_bg"
toolTitle = "text_color"
toolOutput = "gray"
mdHeading = "#f0c674"
mdLink = "#81a2be"
mdLinkUrl = "dim_gray"
mdCode = "accent_color"
mdCodeBlock = "green"
mdCodeBlockBorder = "gray"
mdQuote = "gray"
mdQuoteBorder = "gray"
mdHr = "gray"
mdListBullet = "accent_color"
toolDiffAdded = "green"
toolDiffRemoved = "red"
toolDiffContext = "gray"
syntaxComment = "#6A9955"
syntaxKeyword = "#569CD6"
syntaxFunction = "#DCDCAA"
syntaxVariable = "#9CDCFE"
syntaxString = "#CE9178"
syntaxNumber = "#B5CEA8"
syntaxType = "#4EC9B0"
syntaxOperator = "#D4D4D4"
syntaxPunctuation = "#D4D4D4"
thinkingOff = "dark_gray"
thinkingMinimal = "#6e6e6e"
thinkingLow = "#5f87af"
thinkingMedium = "#81a2be"
thinkingHigh = "#b294bb"
thinkingXhigh = "#d183e8"
bashMode = "green"
