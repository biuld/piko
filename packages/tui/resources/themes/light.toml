# piko built-in theme: light
# Optimized for light terminal backgrounds.

[theme]
name = "light"

[vars]
teal = "#5a8080"
blue = "#547da7"
green = "#588458"
red = "#aa5555"
yellow = "#9a7326"
text_color = "#1f2328"
medium_gray = "#6c6c6c"
dim_gray = "#767676"
light_gray = "#b0b0b0"
selected_bg = "#d0d0e0"
user_msg_bg = "#e8e8e8"
tool_pending_bg = "#e8e8f0"
tool_success_bg = "#e8f0e8"
tool_error_bg = "#f0e8e8"
custom_msg_bg = "#ede7f6"

[colors]
accent = "teal"
accentAlt = "blue"
border = "blue"
borderAccent = "teal"
borderMuted = "light_gray"
success = "green"
error = "red"
warning = "yellow"
info = "blue"
muted = "medium_gray"
dim = "dim_gray"
text = "text_color"

# Layer 2 — extended
thinkingText = "medium_gray"
selectedBg = "selected_bg"
userMessageBg = "user_msg_bg"
userMessageText = "text_color"
customMessageBg = "custom_msg_bg"
customMessageText = "text_color"
customMessageLabel = "#7e57c2"
toolPendingBg = "tool_pending_bg"
toolSuccessBg = "tool_success_bg"
toolErrorBg = "tool_error_bg"
toolTitle = "text_color"
toolOutput = "medium_gray"
mdHeading = "yellow"
mdLink = "blue"
mdLinkUrl = "dim_gray"
mdCode = "teal"
mdCodeBlock = "green"
mdCodeBlockBorder = "medium_gray"
mdQuote = "medium_gray"
mdQuoteBorder = "medium_gray"
mdHr = "medium_gray"
mdListBullet = "green"
toolDiffAdded = "green"
toolDiffRemoved = "red"
toolDiffContext = "medium_gray"
syntaxComment = "#008000"
syntaxKeyword = "#0000FF"
syntaxFunction = "#795E26"
syntaxVariable = "#001080"
syntaxString = "#A31515"
syntaxNumber = "#098658"
syntaxType = "#267F99"
syntaxOperator = "#000000"
syntaxPunctuation = "#000000"
thinkingOff = "light_gray"
thinkingMinimal = "#767676"
thinkingLow = "blue"
thinkingMedium = "teal"
thinkingHigh = "#875f87"
thinkingXhigh = "#8b008b"
bashMode = "green"
