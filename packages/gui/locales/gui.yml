settings.title:
  en: Settings
settings.placeholder:
  en: Settings controls for this section will appear in a future update.
settings.general.lede:
  en: Default model and thinking level apply to new sessions. You can also change them from the command palette.
settings.general.model.label:
  en: Default model
settings.general.model.detail:
  en: Host default provider and model id for new sessions.
settings.general.model.unset:
  en: Not set
settings.general.model.catalog:
  en: Available models
settings.general.model.refresh:
  en: Refresh catalog
settings.general.model.empty:
  en: No models in the catalog yet. Refresh after configuring provider authentication.
settings.general.thinking.label:
  en: Default thinking level
settings.general.thinking.detail:
  en: Reasoning budget for models that support extended thinking.
settings.general.hide_thinking.label:
  en: Hide thinking blocks
settings.general.hide_thinking.detail:
  en: Hide reasoning/thinking content in the GUI timeline. This applies only to the desktop client.
settings.appearance.lede:
  en: GUI-only presentation preferences stored under the [gui] namespace.
settings.appearance.light_theme.label:
  en: Light theme
settings.appearance.light_theme.detail:
  en: Use the light chrome palette for surfaces, text, and elevated panels.
settings.appearance.reduced_motion.label:
  en: Reduced motion
settings.appearance.reduced_motion.detail:
  en: Prefer instant transitions instead of animated motion in the desktop client.
settings.account.lede:
  en: Provider authentication status from the model catalog. API keys and OAuth are stored separately in auth.json.
settings.account.providers.empty:
  en: No providers loaded. Refresh the catalog after hostd starts.
settings.account.providers.authenticated:
  en: Authenticated
settings.account.providers.not_authenticated:
  en: Not authenticated
settings.account.providers.models:
  en: models
settings.account.auth_hint:
  en: Use the TUI /login flow or host auth commands to add API keys or complete OAuth. The GUI does not collect secrets yet.
settings.account.refresh:
  en: Refresh provider status
settings.agent_tools.lede:
  en: Shared runtime tool execution settings stored by hostd.
settings.agent_tools.sandbox.label:
  en: Enable sandbox
settings.agent_tools.sandbox.detail:
  en: Apply filesystem and shell sandbox rules to tool execution.
settings.agent_tools.tools_restricted.label:
  en: Disable all tools
settings.agent_tools.tools_restricted.detail:
  en: When enabled, active-tool-names is set to an empty list so no tools run.
settings.agent_tools.mcp_hint:
  en: MCP server management is not available in Settings yet. Edit ~/.piko/settings.toml or use host tooling.
settings.context.lede:
  en: Automatic context management and API reliability settings.
settings.context.compaction.label:
  en: Automatic compaction
settings.context.compaction.detail:
  en: Let hostd compact long transcripts when they exceed configured thresholds.
settings.context.retry.label:
  en: API retries
settings.context.retry.detail:
  en: Retry failed model API requests with exponential backoff.
settings.advanced.lede:
  en: Paths and low-level configuration live on disk. GUI editing for session-dir and project scope is deferred.
settings.advanced.open_config:
  en: Open config folder
settings.advanced.deferred:
  en: Session directory editing and write-scope controls will ship in a later release.
