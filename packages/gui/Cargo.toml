[package]
name = "piko-gui"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "GPUI desktop client for piko hostd"

[[bin]]
name = "piko-gui"
path = "src/main.rs"

[package.metadata.bundle]
name = "Piko"
identifier = "dev.piko.gui"
icon = ["assets/app/AppIcon.png"]

[dependencies]
piko-client-core = { path = "../client-core" }
piko-comms = { path = "../comms" }
piko-protocol = { path = "../protocol" }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# GPUI stack — pinned crates.io versions (immutable registry releases).
# See docs/dependency-pins.md for revision provenance and upgrade procedure.
gpui = { version = "=0.2.2", default-features = false, features = ["font-kit", "runtime_shaders"] }
gpui-component = { version = "=0.5.1" }
rust-i18n = "3"
log = "0.4"
uuid = { version = "1", features = ["v4"] }
