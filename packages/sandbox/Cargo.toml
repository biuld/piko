[package]
name = "piko-sandbox"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Fail-closed filesystem and process sandbox for piko"

[[bin]]
name = "piko-sandbox"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
shell-words = "1.1"
tempfile = "3"
thiserror = "2"

