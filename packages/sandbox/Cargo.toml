[package]
name = "piko-sandbox"
version = "0.1.0"
edition = "2024"
license.workspace = true
description = "Fail-closed filesystem and process sandbox for piko"

[lib]
name = "piko_sandbox"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
shell-words = "1.1"
tempfile = "3"
thiserror = "2"

