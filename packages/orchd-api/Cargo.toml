[package]
name = "orchd-api"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Public contract for the piko agent runtime (orchd)"

[dependencies]
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
futures-core = "0.3"
piko-protocol = { version = "0.1.0", path = "../protocol" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
uuid = { version = "1", features = ["v4"] }
