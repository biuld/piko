[package]
name = "hostd"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "piko host runtime daemon"

[lib]
name = "hostd"
path = "src/lib.rs"

[[bin]]
name = "hostd"
path = "src/main.rs"

[dependencies]
orchd = { path = "../orchd" }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
uuid = { version = "1", features = ["v4", "serde"] }
tracing = "0.1"
tracing-subscriber = "0.3"
reqwest = { version = "0.12", features = ["json"] }
chrono = "0.4"
piko-protocol = { version = "0.1.0", path = "../protocol" }

[dev-dependencies]
tempfile = "3"
tokio-util = "0.7"
