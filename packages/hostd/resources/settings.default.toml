# ~/.piko/settings.toml
# Global settings for piko

# Default AI provider (e.g., "anthropic", "openai", "google", "deepseek")
# default-provider = "anthropic"

# Default AI model ID (e.g., "claude-3-5-sonnet", "gpt-4o")
# default-model = "claude-3-5-sonnet"

# Default thinking level for reasoning models ("off", "minimal", "low", "medium", "high", "xhigh")
# default-thinking-level = "medium"

# TUI theme preference ("dark" or "light")
# theme = "dark"

# Whether to hide thinking/reasoning blocks in the timeline view
# hide-thinking-block = false

# Stdio framing transport protocol ("stdio")
# transport = "stdio"

[compaction]
# Enable automatic history compaction when token count exceeds thresholds
enabled = true
# Number of tokens to reserve for system prompt and current context
reserve-tokens = 16384
# Number of recent tokens to preserve in full detail
keep-recent-tokens = 20000

[retry]
# Enable automatic retries on LLM API connection failures
enabled = true
# Maximum number of retry attempts
max-retries = 3
# Base backoff delay in milliseconds
base-delay-ms = 2000

[sandbox]
# Enable sandboxed tool execution for filesystem and process security
# enabled = false
# Policy path (JSON) for sandbox rule definitions
# policy-path = "sandbox-policy.json"
# Shell path to use for executing terminal commands
# shell-path = "bash"
